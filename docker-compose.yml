version: '3.8'

services:
  database:
    image: mongo:latest
    container_name: prepai-db
    ports:
      - "27017:27017"
    volumes:
      - prepai-db-data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: prepai-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://database:27017/ai-interview-platform
      - JWT_SECRET=super-secret-jwt-key-change-in-prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - database

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: prepai-client
    ports:
      - "5173:80"
    depends_on:
      - server

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: prepai-admin
    ports:
      - "5174:80"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: prepai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - admin
      - server

volumes:
  prepai-db-data:
